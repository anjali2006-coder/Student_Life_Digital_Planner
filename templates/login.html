<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap');
        body,html{
             font-family: "Funnel Sans", sans-serif;
        }
        </style>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="w-screen h-screen flex p-4 items-center justify-center bg-white">
        <div class="w-140 h-100 flex flex-col gap-10 border border-blue-500 rounded-md p-10">
    <h2 class="text-2xl text-center">Login</h2>
    <form method="POST" class="flex flex-col ">
        <input type="text" name="username" placeholder="Username" required class="w-full bg-zinc-200 h-10 p-2 rounded-md"><br>
        <input type="password" name="password" placeholder="Password" class="w-full bg-zinc-200 h-10 p-2 rounded-md"required><br>
         <button href="/register"  class=" text-xl bg-blue-500 px-5 py-3 mt-2 text-white rounded-md hover:bg-blue-700">
                    Login
                 </button>
    </form>
    </div>
    </div>
    </div>
</body>
</html>
