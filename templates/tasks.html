<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap');
        body,html{
             font-family: "Funnel Sans", sans-serif;
        }
        </style>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="h-screen w-screen bg-black text-white p-7 grid grid-cols-6 gap-5">
        <div class="col-span-2 bg-zinc-800 flex flex-col p-4 gap-4">
            <h1 class="text-2xl text-blue-500 text-center">Add new task</h1>
    <form method="POST" action="/add_tasks" class="bg-zinc-600 flex flex-col gap-10 p-4 rounded-xl">
        <input type="text" name="title" class="border py-3 px-2 outline-none rounded-xl" placeholder="Task Title" required>
        <input type="text" name="status"  class="border py-3 px-2 outline-none rounded-xl" placeholder="Task Status" required>
        <input type="date"   class="border py-3 px-2 outline-none rounded-xl" name="deadline" required>
        <button type="submit" class="bg-blue-500 rounded-xl py-3">Add Task</button>
    </form>
</div>
    <div class="col-span-4 bg-zinc-800 p-4 flex flex-col gap-3">
        <h2 class="text-4xl text-blue-500">Your Tasks</h2>
    <ul class="flex flex-row flex-wrap gap-10">
        {% for task in tasks %}
            <div class="bg-zinc-700 py-4 px-5 rounded-xl flex flex-col gap-4">
                <h1 class="text-xl text-pink-400">{{ task.title }}</h1>
                <p>{{ task.deadline }}</p> 
                <p>{{ task.status }}</p>
                <div>
                    <a href="" class="text-blue-500 text-[18px]">Edit</a> |
                    <a href="" class="text-blue-500 text-[18px]">Delete</a>
                </div>
            </div>
        {% endfor %}
    </ul>

    <a href="/home" class="text-blue-500">Back</a>
    </div>
    </div>
</body>
</html>
